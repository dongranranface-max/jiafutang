<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交藏品 - 嘉孚堂</title>
    <meta name="description" content="提交藏品信息">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* 字体增强 */
        h1,h2,h3,h4,h5,h6{font-family:"Noto Serif SC",serif;font-weight:600;line-height:1.35;color:#1a1a1a;letter-spacing:0.02em}
        .hero-title,.page-header h1{font-weight:700;letter-spacing:0.08em}
        .quick-form h2{font-weight:700}
        .btn{font-weight:500;letter-spacing:0.1em;text-transform:uppercase}
        .nav-link{font-weight:500;letter-spacing:0.08em}
        p,label,input,textarea{line-height:1.85;letter-spacing:0.02em}
        body{-webkit-font-smoothing:antialiased}
    </style>
    <style>
        .quick-form { max-width: 500px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 4px 30px rgba(0,0,0,0.08); }
        .quick-form h2 { text-align: center; margin-bottom: 30px; font-size: 24px; color: #333; }
        .quick-form .form-group { margin-bottom: 20px; }
        .quick-form .form-label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; font-weight: 500; }
        .quick-form .form-input, .quick-form .form-select { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: all 0.3s; box-sizing: border-box; }
        .quick-form .form-input:focus, .quick-form .form-select:focus { border-color: #B8860B; outline: none; box-shadow: 0 0 0 3px rgba(184,134,11,0.1); }
        .quick-form .form-textarea { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; min-height: 100px; resize: vertical; box-sizing: border-box; }
        .quick-form .btn-submit { width: 100%; padding: 16px; font-size: 16px; margin-top: 10px; }
        .quick-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .quick-form .form-file { border: 2px dashed #ddd; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .quick-form .form-file:hover { border-color: #B8860B; background: #faf8f5; }
        .quick-form .form-file-icon { font-size: 36px; margin-bottom: 10px; }
        .quick-form .form-file-text { color: #888; font-size: 13px; line-height: 1.5; }
        .quick-form .form-file input { display: none; }
        .quick-form .upload-tips { font-size: 12px; color: #999; margin-top: 8px; }
        .success-message { text-align: center; padding: 60px 20px; display: none; }
        .success-message .icon { font-size: 64px; margin-bottom: 20px; }
        .success-message h3 { font-size: 24px; color: #333; margin-bottom: 10px; }
        .success-message p { color: #666; margin-bottom: 30px; }
        @media (max-width: 600px) {
            .quick-form { padding: 25px; }
            .quick-form .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header" id="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="嘉孚堂" class="logo-img">
            </a>
            <nav class="nav" id="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="collections.html" class="nav-link">藏品展示</a>
                <a href="consignment.html" class="nav-link">征集流程</a>
                <a href="news.html" class="nav-link">新闻动态</a>
                <a href="about.html" class="nav-link">关于我们</a>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="菜单">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-overlay" id="navOverlay"></div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>提交藏品</h1>
            <p>填写基本信息，快速提交藏品</p>
        </div>
    </section>

    <!-- Quick Form -->
    <section class="form-section" style="background:#f5f5f5;padding:40px 0 60px;">
        <div class="container">
            <!-- 表单 -->
            <div class="quick-form" id="formContainer">
                <h2>快速提交藏品</h2>
                <form id="submissionForm">
                    <div class="form-group">
                        <label class="form-label">藏品名称 *</label>
                        <input type="text" class="form-input" id="itemName" required placeholder="请输入藏品名称">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">藏品类别 *</label>
                        <select class="form-select" id="itemCategory" required>
                            <option value="">请选择类别</option>
                            <option value="art">艺术品</option>
                            <option value="antique">古董文物</option>
                            <option value="jewelry">珠宝奢侈品</option>
                            <option value="coin">文献邮币</option>
                            <option value="nft">数字藏品</option>
                            <option value="misc">杂项</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">上传藏品图片</label>
                        <label class="form-file">
                            <input type="file" id="itemImages" accept="image/*" multiple>
                            <div class="form-file-icon">📷</div>
                            <p class="form-file-text">点击上传图片<br>支持 JPG、PNG</p>
                        </label>
                        <p class="upload-tips">可上传多张图片，更有助于专家评估</p>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">简单描述</label>
                        <textarea class="form-textarea" id="itemDesc" placeholder="如：年代、材质、尺寸、来源等（选填）"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">您的姓名 *</label>
                            <input type="text" class="form-input" id="contactName" required placeholder="联系人">
                        </div>
                        <div class="form-group">
                            <label class="form-label">手机号 *</label>
                            <input type="tel" class="form-input" id="contactMobile" required placeholder="手机号">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">微信号</label>
                        <input type="text" class="form-input" id="contactWechat" placeholder="微信号（选填）">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-submit">提交藏品</button>
                </form>
            </div>
            
            <!-- 成功提示 -->
            <div class="quick-form success-message" id="successMessage">
                <div class="icon">✅</div>
                <h3>提交成功！</h3>
                <p>感谢您的提交，我们的专家团队将在24小时内与您联系</p>
                <a href="index.html" class="btn btn-primary">返回首页</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h3 class="footer-logo"><img src="images/logo.png" alt="嘉孚堂" class="footer-logo-img"></h3>
                    <p class="footer-tagline">让珍宝遇见知己</p>
                </div>
                <div class="footer-contact">
                    <h4 class="footer-title">联系我们</h4>
                    <p class="footer-item">📞 电话：400-675-6897</p>
                    <p class="footer-item">📧 邮箱：jiafutang@jiafutangbid.cn</p>
                    <p class="footer-item">📍 地址：海南省海口区龙华富豪花园16号</p>
                </div>
                <div class="footer-links">
                    <h4 class="footer-title">快速链接</h4>
                    <a href="collections.html">藏品展示</a>
                    <a href="consignment.html">征集流程</a>
                    <a href="about.html">关于我们</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 嘉孚堂 版权所有</p>
            </div>
        </div>
    </footer>

    <script>
    document.getElementById('submissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // 获取图片文件
        const fileInput = document.getElementById('itemImages');
        const images = fileInput.files;
        
        // 如果有图片，转换为base64保存（演示用）
        const processImages = async () => {
            let imageUrls = [];
            if (images && images.length > 0) {
                for (let i = 0; i < Math.min(images.length, 3); i++) {
                    const base64 = await toBase64(images[i]);
                    imageUrls.push(base64);
                }
            }
            
            const data = {
                itemName: document.getElementById('itemName').value,
                itemCategory: document.getElementById('itemCategory').value,
                itemDesc: document.getElementById('itemDesc').value,
                contactName: document.getElementById('contactName').value,
                contactMobile: document.getElementById('contactMobile').value,
                contactWechat: document.getElementById('contactWechat').value,
                itemImages: imageUrls,
                createdAt: new Date().toISOString()
            };
            
            // 保存到本地存储（演示用）
            const submissions = JSON.parse(localStorage.getItem('jiafutang_submissions') || '[]');
            submissions.push(data);
            localStorage.setItem('jiafutang_submissions', JSON.stringify(submissions));
            
            // 显示成功
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        };
        
        processImages();
    });
    
    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }
    </script>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
