                <button class="about-next" onclick="changeAboutSlide(1)" style="position:absolute;top:50%;right:15px;transform:translateY(-50%);width:50px;height:50px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;cursor:pointer;font-size:24px;color:#333;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:all 0.3s;z-index:10;">&#10095;</button>
                <div class="about-dots" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;">
                    <span class="about-dot active" onclick="goToAboutSlide(0)" style="width:12px;height:12px;background:#fff;border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.3);"></span>
                    <span class="about-dot" onclick="goToAboutSlide(1)" style="width:12px;height:12px;background:rgba(255,255,255,0.6);border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.3);"></span>

                    <span class="about-dot" onclick="goToAboutSlide(3)" style="width:12px;height:12px;background:rgba(255,255,255,0.6);border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.3);"></span>
                    <span class="about-dot" onclick="goToAboutSlide(4)" style="width:12px;height:12px;background:rgba(255,255,255,0.6);border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.3);"></span>

    <style>
        @media (max-width:768px) {
            .about-slide img { height:280px !important; }
            .about-prev, .about-next { width:40px !important;height:40px !important;font-size:18px !important; }
            .about-prev { left:8px !important; }
            .about-next { right:8px !important; }
            .about-dots { bottom:12px !important; }
            .about-dot { width:10px !important;height:10px !important; }
        }
    </style>

    <script>
        let aboutCurrentSlide = 0;
        const aboutSlides = document.querySelectorAll('.about-slide');
        const aboutTotalSlides = aboutSlides.length;
        let aboutAutoplayInterval;

        function updateAboutSlider() {
            const slidesContainer = document.querySelector('.about-slides');
            slidesContainer.style.transform = 'translateX(-' + (aboutCurrentSlide * 100) + '%)';
            document.querySelectorAll('.about-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === aboutCurrentSlide);
                dot.style.background = index === aboutCurrentSlide ? '#fff' : 'rgba(255,255,255,0.6)';
            });
        }

        function changeAboutSlide(direction) {
            aboutCurrentSlide = (aboutCurrentSlide + direction + aboutTotalSlides) % aboutTotalSlides;
            updateAboutSlider();
        }

        function goToAboutSlide(index) {
            aboutCurrentSlide = index;
            updateAboutSlider();
            resetAboutAutoplay();
        }

        function startAboutAutoplay() {
            aboutAutoplayInterval = setInterval(() => changeAboutSlide(1), 4000);
        }

        function resetAboutAutoplay() {
            clearInterval(aboutAutoplayInterval);
            startAboutAutoplay();
        }

        startAboutAutoplay();
    </script>
