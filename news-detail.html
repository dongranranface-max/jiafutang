    <style>
        /* 新闻详情页专用样�?*/
        .news-detail {

        .news-detail-container {

        .news-detail-header h1 {

        .news-detail-meta {

        .news-detail-cover {
            width: 100%;

        .news-detail-cover img {

        .news-detail-cover:hover img {

        .news-detail-content {

        }
        
        .news-detail-content p {
            margin-bottom: 20px;

        }
        
        .news-detail-content img {
            max-width: 100%;

        .news-detail-content h2 {
            font-family: var(--font-serif);

        .news-detail-content h3 {

        .news-detail-nav {

            gap: 20px;

        .news-detail-nav a {
            flex: 1;

            transition: all 0.3s;

        }
        
        .news-detail-nav a:hover {
            background: var(--color-primary);

        }
        
        .news-detail-nav span {
            flex: 1;
            padding: 20px;

            color: #999;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .nav-label {
            font-size: 12px;
            color: #888;
            display: block;

        .news-detail-nav a:hover .nav-label {
            color: rgba(255,255,255,0.8);
        }
        
        .nav-title {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* 加载状�?*/
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        
        .error-container {
            text-align: center;
            padding: 100px 20px;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        
        /* 分享 */
        .news-share {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .share-label {
            color: #888;
            font-size: 14px;
        }
        
        .share-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .share-btn:hover {
            background: var(--color-primary);
            color: #fff;
        }
        
        /* 相关推荐 */
        .related-news {
            margin-top: 60px;
        }
        
        .related-title {
            font-family: var(--font-serif);
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--color-primary);
        }
        
        .related-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .related-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .related-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .related-card-image {
            height: 140px;
            overflow: hidden;
        }
        
        .related-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .related-card-content {
            padding: 15px;
        }
        
        .related-card-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .news-detail {
                padding: 100px 0 60px;
            }
            
            .news-detail-header h1 {
                font-size: 24px;
            }
            
            .news-detail-cover {
                height: 250px;
                border-radius: 12px;
            }
            
            .news-detail-content {
                padding: 25px;
                font-size: 15px;
                border-radius: 12px;
            }
            
            .news-detail-nav {
                flex-direction: column;
            }
            
            .news-detail-nav a {
                max-width: 100%;
            }
            
            .related-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <footer class="footer">

    <script>
        const API_URL = 'https://jiafutang.dongranranface.workers.dev';
        const NEWS_CATEGORIES = { all: '全部', brand: '嘉孚堂动�?, industry: '行业动�? };
        
        let news = [];
        let currentNews = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            initHeader();
            loadNewsDetail();
        });
        
        function initHeader() {
            const hamburger = document.getElementById('hamburger');
            const nav = document.getElementById('nav');
            if (hamburger && nav) {
                hamburger.addEventListener('click', function() {
                    hamburger.classList.toggle('active');
                    nav.classList.toggle('active');
                });
                nav.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', function() {
                        hamburger.classList.remove('active');
                        nav.classList.remove('active');
                    });
                });
            }
        }
        
        // 显示加载状�?
        function showLoading() {
            document.getElementById('loadingState').style.display = 'flex';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('newsContentWrapper').style.display = 'none';
        }
        
        // 显示错误状�?
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('newsContentWrapper').style.display = 'none';
        }
        
        // 显示内容
        function showContent() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('newsContentWrapper').style.display = 'block';
        }
        
        async function loadNewsDetail() {
            showLoading();
            
            try {
                // 获取新闻列表
                const res = await fetch(API_URL + '/api/news');
                if (!res.ok) throw new Error('获取新闻失败');
                news = await res.json();
                
                if (!news || news.length === 0) {
                    showError('暂无新闻内容');
                    return;
                }
                
                // 获取URL参数中的新闻ID
                const id = getUrlParam('id');
                console.log('[news-detail] URL参数id:', id);
                console.log('[news-detail] 新闻列表:', news);
                
                // 尝试多种方式匹配：数字或字符�?
                currentNews = news.find(n => n.id == id || n.id === id || String(n.id) === id) || news[0];
                
                console.log('[news-detail] 匹配的新�?', currentNews);
                
                if (!currentNews) {
                    showError('新闻不存�?);
                    return;
                }
                
                // 渲染新闻详情
                renderNewsDetail(currentNews);
                
                // 渲染上下篇导�?
                renderNewsNav();
                
                // 渲染相关新闻
                renderRelatedNews();
                
                showContent();
                
            } catch(e) {
                console.error('加载失败:', e);
                showError('加载失败，请刷新页面或检查网�?);
            }
        }
        
        function renderNewsDetail(item) {
            // 更新页面标题
            document.title = item.title + ' - 嘉孚�?;
            
            // 分类
            const categoryText = item.category === 'brand' ? '嘉孚堂动�? : '行业动�?;
            document.getElementById('newsCategory').textContent = categoryText;
            
            // 标题
            document.getElementById('newsTitle').textContent = item.title;
            
            // 发布时间
            const date = item.created_at ? new Date(item.created_at).toLocaleDateString('zh-CN') : '最近更�?;
            document.getElementById('newsMeta').textContent = '发布时间�? + date;
            
            // 封面�?
            const coverImg = document.getElementById('newsCover');
            coverImg.src = item.cover_image || 'images/logo.png';
            coverImg.alt = item.title;
            coverImg.onerror = function() {
                this.src = 'images/logo.png';
            };
            
            // 内容处理 - 支持HTML和换�?
            const content = item.content || item.summary || '';
            let contentHtml = content;
            
            // 如果内容不包含HTML标签，则处理换行
            if (!content.includes('<')) {
                contentHtml = content.split('\n').map(p => p.trim()).filter(p => p).map(p => `<p>${p}</p>`).join('');
            }
            
            document.getElementById('newsContent').innerHTML = contentHtml;
        }
        
        function renderNewsNav() {
            const currentIndex = news.findIndex(n => n.id === currentNews.id);
            const prevNews = news[currentIndex - 1];
            const nextNews = news[currentIndex + 1];
            
            let navHtml = '';
            
            if (prevNews) {
                navHtml += `<a href="news-detail.html?id=${prevNews.id}">
                    <span class="nav-label">�?上一�?/span>
                    <span class="nav-title">${prevNews.title}</span>
                </a>`;
            } else {
                navHtml += '<span>没有更早的新闻了</span>';
            }
            
            if (nextNews) {
                navHtml += `<a href="news-detail.html?id=${nextNews.id}">
                    <span class="nav-label">下一�?�?/span>
                    <span class="nav-title">${nextNews.title}</span>
                </a>`;
            } else {
                navHtml += '<span>没有更新的新闻了</span>';
            }
            
            document.getElementById('newsNav').innerHTML = navHtml;
        }
        
        function renderRelatedNews() {
            // 获取同分类的其他新闻，排除当前新�?
            const related = news
                .filter(n => n.id !== currentNews.id && n.category === currentNews.category)
                .slice(0, 3);
            
            // 如果同分类不够，取其他分�?
            if (related.length < 3) {
                const others = news
                    .filter(n => n.id !== currentNews.id && n.category !== currentNews.category)
                    .slice(0, 3 - related.length);
                related.push(...others);
            }
            
            if (related.length === 0) {
                document.getElementById('relatedNews').style.display = 'none';
                return;
            }
            
            const relatedHtml = related.map(item => `
                <a href="news-detail.html?id=${item.id}" class="related-card">
                    <div class="related-card-image">
                        <img src="${item.cover_image || 'images/logo.png'}" alt="${item.title}" onerror="this.src='images/logo.png'">
                    </div>
                    <div class="related-card-content">
                        <p class="related-card-title">${item.title}</p>
                    </div>
                </a>
            `).join('');
            
            document.getElementById('relatedGrid').innerHTML = relatedHtml;
        }
        
        // 复制链接分享
        function copyLink() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴�?);
            }).catch(() => {
                // 兼容旧浏览器
                const input = document.createElement('input');
                input.value = url;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('链接已复制到剪贴�?);
            });
        }
        
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
    </script>
</body>
